[pytest]
# rootdir is anchored here (under tests/), NOT at the repo root, on purpose:
# the plugin's repo-root __init__.py is a QGIS entry point, so pytest would
# import it — pulling in the whole Qt/QGIS UI — if the repo root were the
# rootdir. Keeping the config here stops that.
#
# Run the suite as `pytest tests/unit` (from the repo root) or `cd tests &&
# pytest` — e.g. via `make test`. importlib import mode avoids sys.path/__init__
# package games for the test modules; conftest.py puts the repo root on sys.path
# so `import src.core...` resolves.
testpaths = unit
addopts = --import-mode=importlib
