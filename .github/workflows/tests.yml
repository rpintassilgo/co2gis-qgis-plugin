name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        # No QGIS needed: the unit suite exercises the pure domain math in
        # src/core (QGIS/GDAL are stubbed in tests/conftest.py). pulp + highspy are the
        # optional Level-3 MILP solver — installed here so the MILP tests run in CI (they
        # skip gracefully where the solver is absent).
        run: pip install ruff pytest numpy pulp highspy

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Unit tests (pytest)
        run: pytest tests/unit
